<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 01 – Dynamic List Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📋 Dynamic List Manager</h1>
    <p class="subtitle">Add, manage, and delete your list items</p>

    <div class="input-group">
      <input type="text" id="item-input" placeholder="Type a new item..." />
      <button id="add-btn">Add Item</button>
    </div>

    <ul id="item-list"></ul>

    <p id="empty-msg">No items yet. Add one above!</p>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
