<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 02 – Animated Image Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🖼️ Animated Image Gallery</h1>
    <p class="subtitle">Browse through our beautiful collection</p>

    <div class="gallery-wrapper">
      <button id="prev-btn" class="nav-btn">&#8249;</button>

      <div class="gallery-card">
        <img id="gallery-img" src="" alt="Gallery Image" />
        <div id="gallery-caption"></div>
        <div class="counter">
          <span id="current-index">1</span> / <span id="total-images"></span>
        </div>
      </div>

      <button id="next-btn" class="nav-btn">&#8250;</button>
    </div>

    <div class="dots" id="dot-container"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
